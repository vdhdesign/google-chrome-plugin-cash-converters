<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Cash Converters Buy Now</title>
    <style>
      body {
        font-family: system-ui, -apple-system, sans-serif;
        margin: 0;
        padding: 14px 16px;
        min-width: 240px;
      }

      label {
        align-items: center;
        cursor: pointer;
        display: flex;
        gap: 10px;
        user-select: none;
      }

      input {
        cursor: pointer;
        height: 16px;
        width: 16px;
      }

      .hint {
        color: #666;
        font-size: 12px;
        line-height: 1.4;
        margin: 8px 0 0 26px;
      }
    </style>
  </head>
  <body>
    <label>
      <input type="checkbox" id="buyNowOnly" />
      Items with buy now only
    </label>
    <p class="hint">
      Grey out listings that do not have a buy now price.
    </p>
    <script src="popup.js"></script>
  </body>
</html>
